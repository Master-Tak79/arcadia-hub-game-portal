<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lane Switch: Neon Run | Arcadia Hub</title>
    <style>
      :root {
        --bg: #060a1d;
        --panel: #101734;
        --text: #ecf1ff;
        --muted: #9aa9d8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 15% -10%, #22357d 0%, #070b1f 45%, #030510 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
      }
      .shell {
        width: min(100%, 460px);
        height: min(100dvh - 20px, 920px);
        height: min(100svh - 20px, 920px);
        background: color-mix(in srgb, var(--panel) 90%, #050816 10%);
        border: 1px solid rgba(120, 175, 255, 0.25);
        border-radius: 18px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        padding: calc(env(safe-area-inset-top) + 8px) 10px 8px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(11, 18, 44, 0.95);
      }
      .mini-link {
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.06);
      }
      .title-wrap h1 {
        margin: 0;
        font-size: 15px;
      }
      .title-wrap p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
      }
      .hud {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 6px 8px;
        background: rgba(7, 12, 35, 0.88);
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .hud-card {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        padding: 6px 7px;
      }
      .hud-label {
        margin: 0;
        color: var(--muted);
        font-size: 10px;
      }
      .hud-value {
        margin: 3px 0 0;
        font-size: 14px;
        font-weight: 700;
      }
      .game-wrap {
        position: relative;
        flex: 1;
        min-height: 240px;
        background: #030716;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 20px;
        background: linear-gradient(to bottom, rgba(5,8,23,0.3), rgba(5,8,23,0.9));
      }
      .overlay.hidden { display: none; }
      .panel { max-width: 300px; }
      .panel h2 { margin: 0 0 8px; }
      .panel p {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.45;
        color: var(--muted);
      }
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      button, .ghost-link {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }
      button {
        color: #04121f;
        background: linear-gradient(135deg, #6fb4ff, #4ee8d3);
      }
      .ghost-link {
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px 10px calc(env(safe-area-inset-bottom) + 10px);
        background: rgba(10,16,40,0.92);
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .controls button {
        min-height: 52px;
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
      }
      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        padding: 0 10px calc(env(safe-area-inset-bottom) + 8px);
        background: rgba(10,16,40,0.92);
      }
      .notice {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        font-weight: 700;
        color: #fff4b1;
        text-shadow: 0 1px 8px rgba(0,0,0,0.5);
        opacity: 0;
        transition: opacity 0.12s ease;
        pointer-events: none;
      }
      .notice.visible { opacity: 1; }
      @media (max-width: 700px) {
        body { padding: 0; align-items: stretch; }
        .shell {
          width: 100%;
          height: 100dvh;
          height: 100svh;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="mini-link" href="../../index.html" aria-label="포털로 이동">← 포털</a>
        <div class="title-wrap">
          <h1>Lane Switch: Neon Run</h1>
          <p>레인 전환으로 장애물을 피하고 코인을 모으세요</p>
        </div>
        <div></div>
      </header>

      <section class="hud" aria-live="polite">
        <article class="hud-card"><p class="hud-label">점수</p><p id="scoreText" class="hud-value">0</p></article>
        <article class="hud-card"><p class="hud-label">최고</p><p id="bestText" class="hud-value">0</p></article>
        <article class="hud-card"><p class="hud-label">속도</p><p id="speedText" class="hud-value">1x</p></article>
        <article class="hud-card"><p class="hud-label">체력</p><p id="livesText" class="hud-value">❤❤❤</p></article>
      </section>

      <section class="game-wrap">
        <canvas id="gameCanvas" width="540" height="960" aria-label="Lane Switch canvas"></canvas>
        <p id="notice" class="notice"></p>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h2 id="overlayTitle">Lane Switch: Neon Run</h2>
            <p id="overlayText">좌/우로 레인을 전환해 장애물을 피하세요.<br />코인을 먹으면 점수를 크게 올릴 수 있습니다.</p>
            <div class="btn-row">
              <button id="startBtn" type="button">시작</button>
              <a class="ghost-link" href="../../index.html">포털로</a>
            </div>
          </div>
        </div>
      </section>

      <div class="controls" aria-label="move controls">
        <button id="leftBtn" type="button">◀ 왼쪽</button>
        <button id="rightBtn" type="button">오른쪽 ▶</button>
      </div>
      <p class="hint">팁: 터치 스와이프(좌/우)도 가능합니다. 속도가 올라갈수록 레인 전환 타이밍이 중요합니다.</p>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
