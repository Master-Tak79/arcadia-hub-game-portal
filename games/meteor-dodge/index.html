<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meteor Dodge | Arcadia Hub</title>
    <style>
      :root {
        --bg: #070b1f;
        --panel: #111734;
        --text: #ebefff;
        --muted: #9aa8d3;
        --accent: #4de2ff;
        --danger: #ff6b6b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 15% -10%, #22357d 0%, #070b1f 45%, #030510 100%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .shell {
        width: min(100%, 460px);
        background: color-mix(in srgb, var(--panel) 90%, #050816 10%);
        border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(4, 7, 22, 0.6);
        overflow: hidden;
      }

      .topbar {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title-wrap h1 {
        margin: 0;
        font-size: 1.06rem;
      }

      .title-wrap p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.83rem;
      }

      .link-btn {
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.8rem;
      }

      .hud {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 10px 12px;
        background: rgba(7, 12, 35, 0.8);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .hud-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 8px;
      }

      .hud-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.7rem;
      }

      .hud-value {
        margin: 2px 0 0;
        font-weight: 700;
        font-size: 0.95rem;
      }

      .game-wrap {
        position: relative;
        aspect-ratio: 9 / 16;
        background: #03071a;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(to bottom, rgba(5, 8, 23, 0.3), rgba(5, 8, 23, 0.88));
        padding: 20px;
        text-align: center;
      }

      .overlay.hidden {
        display: none;
      }

      .panel {
        max-width: 290px;
      }

      .panel h2 {
        margin: 0 0 8px;
      }

      .panel p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.92rem;
      }

      .btn-row {
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #3db5ff, #24d8db);
        color: #04121f;
      }

      button.ghost {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px 12px 14px;
      }

      .controls button {
        padding: 12px;
        font-size: 1rem;
        user-select: none;
      }

      .hint {
        margin: 0;
        font-size: 0.76rem;
        color: var(--muted);
        padding: 0 12px 10px;
      }

      @media (min-width: 700px) {
        .controls { display: none; }
        .hint { padding-bottom: 14px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>Meteor Dodge</h1>
          <p>운석을 피해서 최대한 오래 버티세요</p>
        </div>
        <a class="link-btn" href="../../index.html">포털로</a>
      </header>

      <section class="hud" aria-live="polite">
        <article class="hud-card">
          <p class="hud-label">점수</p>
          <p id="scoreText" class="hud-value">0</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">최고 점수</p>
          <p id="bestText" class="hud-value">0</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">체력</p>
          <p id="livesText" class="hud-value">3</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">레벨</p>
          <p id="levelText" class="hud-value">1</p>
        </article>
      </section>

      <section class="game-wrap">
        <canvas id="gameCanvas" width="540" height="960" aria-label="Meteor Dodge game canvas"></canvas>

        <div id="overlay" class="overlay">
          <div class="panel">
            <h2 id="overlayTitle">Meteor Dodge</h2>
            <p id="overlayText">좌우 이동으로 운석을 피하세요.<br />키보드(←/→, A/D) 또는 터치로 조작할 수 있습니다.</p>
            <div class="btn-row">
              <button id="startBtn" type="button">시작</button>
              <button id="pauseBtn" type="button" class="ghost">일시정지</button>
            </div>
          </div>
        </div>
      </section>

      <div class="controls" aria-label="mobile controls">
        <button id="leftBtn" type="button" class="ghost">◀ 왼쪽</button>
        <button id="rightBtn" type="button" class="ghost">오른쪽 ▶</button>
      </div>
      <p class="hint">팁: 점수가 오를수록 운석 속도와 생성 빈도가 증가합니다.</p>
    </main>

    <script type="module">
      const STORAGE_KEY = "arcadia_meteor_dodge_best_v1";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const scoreText = document.getElementById("scoreText");
      const bestText = document.getElementById("bestText");
      const livesText = document.getElementById("livesText");
      const levelText = document.getElementById("levelText");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const leftBtn = document.getElementById("leftBtn");
      const rightBtn = document.getElementById("rightBtn");

      const state = {
        running: false,
        paused: false,
        gameOver: false,
        score: 0,
        best: Number(localStorage.getItem(STORAGE_KEY) || 0),
        level: 1,
        lives: 3,
        meteorSpawnMs: 820,
        spawnElapsed: 0,
        meteorSpeedBase: 255,
        hitFlash: 0,
        invincibleMs: 0,
      };

      const input = {
        left: false,
        right: false,
        pointerActive: false,
      };

      const player = {
        x: canvas.width * 0.5,
        y: canvas.height * 0.86,
        w: 76,
        h: 42,
        speed: 440,
      };

      const stars = Array.from({ length: 66 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.4,
        vy: Math.random() * 34 + 10,
      }));

      const meteors = [];

      let rafId = 0;
      let lastTs = performance.now();

      function resetGame() {
        state.score = 0;
        state.level = 1;
        state.lives = 3;
        state.meteorSpawnMs = 820;
        state.meteorSpeedBase = 255;
        state.spawnElapsed = 0;
        state.hitFlash = 0;
        state.invincibleMs = 0;
        state.gameOver = false;
        player.x = canvas.width * 0.5;
        meteors.length = 0;
        syncHud();
      }

      function startGame() {
        if (!state.gameOver && state.running) return;
        if (state.gameOver) resetGame();
        state.running = true;
        state.paused = false;
        overlay.classList.add("hidden");
        pauseBtn.textContent = "일시정지";
      }

      function pauseGame() {
        if (!state.running || state.gameOver) return;
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? "재개" : "일시정지";
        if (state.paused) {
          showOverlay("일시정지", "재개 버튼 또는 일시정지 버튼으로 다시 시작할 수 있습니다.");
        } else {
          overlay.classList.add("hidden");
        }
      }

      function endGame() {
        state.running = false;
        state.gameOver = true;
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem(STORAGE_KEY, String(state.best));
        }
        syncHud();
        showOverlay(
          "게임 오버",
          `최종 점수 ${state.score}점 · 최고 점수 ${state.best}점\n다시 시작하려면 시작 버튼을 누르세요.`
        );
        startBtn.textContent = "다시 시작";
      }

      function showOverlay(title, text) {
        overlayTitle.textContent = title;
        overlayText.innerHTML = text.replace(/\n/g, "<br />");
        overlay.classList.remove("hidden");
      }

      function syncHud() {
        scoreText.textContent = String(state.score);
        bestText.textContent = String(state.best);
        livesText.textContent = "❤".repeat(Math.max(0, state.lives));
        levelText.textContent = String(state.level);
      }

      function spawnMeteor() {
        const levelFactor = 1 + state.level * 0.11;
        const r = Math.random() * 30 + 18;
        meteors.push({
          x: Math.random() * (canvas.width - r * 2) + r,
          y: -r - 10,
          r,
          vy: (state.meteorSpeedBase + Math.random() * 130) * levelFactor,
          vx: (Math.random() - 0.5) * 54,
          rot: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 2.6,
        });
      }

      function circleRectHit(circle, rect) {
        const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy < circle.r * circle.r;
      }

      function clampPlayer() {
        const half = player.w * 0.5;
        player.x = Math.max(half, Math.min(canvas.width - half, player.x));
      }

      function step(deltaSec) {
        if (!state.running || state.paused) return;

        const move = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        player.x += move * player.speed * deltaSec;
        clampPlayer();

        state.spawnElapsed += deltaSec * 1000;
        if (state.spawnElapsed >= state.meteorSpawnMs) {
          spawnMeteor();
          state.spawnElapsed = 0;
        }

        const difficultyPulse = Math.min(1.8, state.score / 1000);
        state.meteorSpawnMs = Math.max(250, 820 - state.score * 0.7);
        state.meteorSpeedBase = 255 + difficultyPulse * 150;
        state.level = 1 + Math.floor(state.score / 160);

        if (state.invincibleMs > 0) state.invincibleMs -= deltaSec * 1000;
        if (state.hitFlash > 0) state.hitFlash -= deltaSec;

        const playerRect = {
          x: player.x - player.w * 0.5,
          y: player.y - player.h * 0.5,
          w: player.w,
          h: player.h,
        };

        for (let i = meteors.length - 1; i >= 0; i -= 1) {
          const m = meteors[i];
          m.x += m.vx * deltaSec;
          m.y += m.vy * deltaSec;
          m.rot += m.spin * deltaSec;

          if (m.x - m.r < 0 || m.x + m.r > canvas.width) m.vx *= -1;

          if (m.y - m.r > canvas.height + 50) {
            meteors.splice(i, 1);
            state.score += 4;
            continue;
          }

          if (state.invincibleMs <= 0 && circleRectHit(m, playerRect)) {
            meteors.splice(i, 1);
            state.lives -= 1;
            state.hitFlash = 0.36;
            state.invincibleMs = 780;
            if (state.lives <= 0) {
              endGame();
              break;
            }
          }
        }

        state.score += Math.floor(50 * deltaSec);
        syncHud();
      }

      function drawShip(x, y, w, h) {
        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = "#5be3ff";
        ctx.beginPath();
        ctx.moveTo(0, -h * 0.58);
        ctx.lineTo(w * 0.52, h * 0.5);
        ctx.lineTo(0, h * 0.18);
        ctx.lineTo(-w * 0.52, h * 0.5);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#8bf1ff";
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.05, w * 0.12, h * 0.16, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffa45f";
        ctx.beginPath();
        ctx.moveTo(-w * 0.16, h * 0.5);
        ctx.lineTo(0, h * (0.5 + Math.random() * 0.12));
        ctx.lineTo(w * 0.16, h * 0.5);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      function drawMeteor(m) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.rot);

        const grd = ctx.createRadialGradient(-m.r * 0.3, -m.r * 0.25, m.r * 0.2, 0, 0, m.r * 1.1);
        grd.addColorStop(0, "#f0b36f");
        grd.addColorStop(0.46, "#d46f35");
        grd.addColorStop(1, "#772f1d");

        ctx.fillStyle = grd;
        ctx.beginPath();
        for (let i = 0; i < 8; i += 1) {
          const a = (Math.PI * 2 * i) / 8;
          const jag = m.r * (0.82 + (i % 2 ? 0.3 : 0));
          const px = Math.cos(a) * jag;
          const py = Math.sin(a) * jag;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.arc(m.r * 0.2, m.r * 0.1, m.r * 0.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawBackground(deltaSec) {
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bg.addColorStop(0, "#060f2e");
        bg.addColorStop(1, "#030716");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(170, 210, 255, 0.9)";
        stars.forEach((s) => {
          s.y += s.vy * deltaSec;
          if (s.y > canvas.height) {
            s.y = -5;
            s.x = Math.random() * canvas.width;
          }
          ctx.globalAlpha = 0.35 + (s.r / 2.8);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function render(deltaSec) {
        drawBackground(deltaSec);

        meteors.forEach(drawMeteor);

        if (state.invincibleMs > 0 && Math.floor(state.invincibleMs / 90) % 2 === 0) {
          // blink during invincibility
        } else {
          drawShip(player.x, player.y, player.w, player.h);
        }

        if (state.hitFlash > 0) {
          ctx.fillStyle = `rgba(255, 80, 80, ${Math.min(0.34, state.hitFlash)})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }

      function frame(now) {
        const deltaSec = Math.min(0.033, (now - lastTs) / 1000);
        lastTs = now;

        step(deltaSec);
        render(deltaSec);

        rafId = requestAnimationFrame(frame);
      }

      function setMove(direction, active) {
        if (direction === "left") input.left = active;
        if (direction === "right") input.right = active;
      }

      function bindKeyboard() {
        window.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") setMove("left", true);
          if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") setMove("right", true);
          if (e.key.toLowerCase() === "p") pauseGame();
          if (e.key === " " && !state.running) startGame();
        });

        window.addEventListener("keyup", (e) => {
          if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") setMove("left", false);
          if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") setMove("right", false);
        });
      }

      function bindPointer() {
        const toX = (clientX) => {
          const rect = canvas.getBoundingClientRect();
          const norm = (clientX - rect.left) / rect.width;
          return Math.max(0, Math.min(1, norm)) * canvas.width;
        };

        canvas.addEventListener("pointerdown", (e) => {
          input.pointerActive = true;
          player.x = toX(e.clientX);
          clampPlayer();
          canvas.setPointerCapture(e.pointerId);
          if (!state.running && !state.gameOver) startGame();
        });

        canvas.addEventListener("pointermove", (e) => {
          if (!input.pointerActive) return;
          player.x = toX(e.clientX);
          clampPlayer();
        });

        canvas.addEventListener("pointerup", (e) => {
          input.pointerActive = false;
          try { canvas.releasePointerCapture(e.pointerId); } catch {}
        });
      }

      function bindMobileButtons(button, direction) {
        const down = () => setMove(direction, true);
        const up = () => setMove(direction, false);
        button.addEventListener("pointerdown", down);
        button.addEventListener("pointerup", up);
        button.addEventListener("pointercancel", up);
        button.addEventListener("pointerleave", up);
      }

      startBtn.addEventListener("click", () => {
        if (state.paused) {
          state.paused = false;
          overlay.classList.add("hidden");
          pauseBtn.textContent = "일시정지";
          return;
        }
        startGame();
      });

      pauseBtn.addEventListener("click", pauseGame);

      bindMobileButtons(leftBtn, "left");
      bindMobileButtons(rightBtn, "right");
      bindKeyboard();
      bindPointer();
      syncHud();
      showOverlay("Meteor Dodge", "좌우 이동으로 운석을 피하세요.<br />키보드(←/→, A/D) 또는 터치로 조작할 수 있습니다.");

      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame((ts) => {
        lastTs = ts;
        frame(ts);
      });
    </script>
  </body>
</html>
