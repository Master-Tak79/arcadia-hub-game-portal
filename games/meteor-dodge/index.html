<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meteor Dodge | Arcadia Hub</title>
    <style>
      :root {
        --bg: #070b1f;
        --panel: #111734;
        --text: #ebefff;
        --muted: #9aa8d3;
        --accent: #4de2ff;
        --danger: #ff6b6b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 600px at 15% -10%, #22357d 0%, #070b1f 45%, #030510 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
      }

      .shell {
        width: min(100%, 460px);
        height: min(100dvh - 20px, 920px);
        height: min(100svh - 20px, 920px);
        background: color-mix(in srgb, var(--panel) 90%, #050816 10%);
        border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(4, 7, 22, 0.6);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .topbar {
        padding: calc(env(safe-area-inset-top) + 8px) 10px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
        background: rgba(10, 17, 44, 0.92);
      }

      .mini-link {
        color: var(--text);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.76rem;
        line-height: 1;
        background: rgba(255, 255, 255, 0.06);
        white-space: nowrap;
      }

      .title-wrap h1 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.2;
      }

      .title-wrap p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 0.74rem;
        line-height: 1.2;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .difficulty-select {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text);
        border-radius: 8px;
        padding: 5px 6px;
        font-size: 0.74rem;
      }

      .topbar-actions .ghost {
        padding: 6px 9px;
        font-size: 0.76rem;
        white-space: nowrap;
      }

      .difficulty-select option {
        color: #0c1230;
      }

      .hud {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 6px 8px;
        background: rgba(7, 12, 35, 0.86);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .hud-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 6px 7px;
      }

      .hud-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.62rem;
        line-height: 1;
      }

      .hud-value {
        margin: 3px 0 0;
        font-weight: 700;
        font-size: 0.86rem;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .game-wrap {
        position: relative;
        background: #03071a;
        flex: 1;
        min-height: 240px;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(to bottom, rgba(5, 8, 23, 0.35), rgba(5, 8, 23, 0.9));
        padding: 18px;
        text-align: center;
      }

      .overlay.hidden {
        display: none;
      }

      .panel {
        max-width: 300px;
      }

      .panel h2 {
        margin: 0 0 8px;
      }

      .panel p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.9rem;
      }

      .btn-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .overlay-badge {
        margin: 0 0 10px;
        font-size: 0.8rem;
        font-weight: 700;
        color: #ffe27a;
      }

      .overlay-badge.hidden {
        display: none;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #3db5ff, #24d8db);
        color: #04121f;
      }

      button.ghost,
      .ghost-link {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      .ghost-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px 10px calc(env(safe-area-inset-bottom) + 10px);
        background: rgba(10, 16, 40, 0.92);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }

      .controls button {
        min-height: 52px;
        padding: 11px;
        font-size: 0.98rem;
        user-select: none;
        touch-action: manipulation;
        transition: transform 0.06s ease, background 0.12s ease, border-color 0.12s ease;
      }

      .controls button.is-pressed,
      .controls button:active {
        transform: translateY(1px) scale(0.985);
        background: rgba(95, 195, 255, 0.22);
        border-color: rgba(95, 195, 255, 0.58);
      }

      .hint {
        margin: 0;
        font-size: 0.72rem;
        color: var(--muted);
        padding: 0 10px calc(env(safe-area-inset-bottom) + 8px);
        background: rgba(10, 16, 40, 0.92);
      }

      @media (max-width: 700px) {
        body {
          padding: 0;
          align-items: stretch;
        }

        .shell {
          width: 100%;
          height: 100dvh;
          height: 100svh;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
        }
      }

      @media (max-height: 760px) {
        .title-wrap p,
        .hint,
        .hud-label {
          display: none;
        }

        .hud-card {
          padding: 6px;
        }

        .hud-value {
          margin: 0;
          font-size: 0.82rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="mini-link" href="../../index.html" aria-label="포털로 이동">← 포털</a>
        <div class="title-wrap">
          <h1>Meteor Dodge</h1>
          <p id="subtitleText">운석 회피 아케이드</p>
        </div>
        <div class="topbar-actions">
          <select id="difficultySelect" class="difficulty-select" aria-label="난이도 선택">
            <option value="normal">Normal</option>
            <option value="hard">Hard</option>
          </select>
          <button id="pauseBtn" type="button" class="ghost" aria-label="일시정지">일시정지</button>
        </div>
      </header>

      <section class="hud" aria-live="polite">
        <article class="hud-card">
          <p class="hud-label">점수</p>
          <p id="scoreText" class="hud-value">0</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">최고 점수</p>
          <p id="bestText" class="hud-value">0</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">체력</p>
          <p id="livesText" class="hud-value">3</p>
        </article>
        <article class="hud-card">
          <p class="hud-label">레벨</p>
          <p id="levelText" class="hud-value">1</p>
        </article>
      </section>

      <section class="game-wrap">
        <canvas id="gameCanvas" width="540" height="960" aria-label="Meteor Dodge game canvas"></canvas>

        <div id="overlay" class="overlay">
          <div class="panel">
            <h2 id="overlayTitle">Meteor Dodge</h2>
            <p id="overlayText">좌우 이동으로 운석을 피하세요.<br />키보드(←/→, A/D) 또는 하단 좌/우 버튼으로 조작할 수 있습니다.</p>
            <p id="overlayBadge" class="overlay-badge hidden"></p>
            <div class="btn-row">
              <button id="startBtn" type="button">시작</button>
              <a id="overlayPortalBtn" class="ghost-link" href="../../index.html">포털로</a>
            </div>
          </div>
        </div>
      </section>

      <div class="controls" aria-label="move controls">
        <button id="leftBtn" type="button" class="ghost" aria-label="왼쪽 이동">◀ 왼쪽</button>
        <button id="rightBtn" type="button" class="ghost" aria-label="오른쪽 이동">오른쪽 ▶</button>
      </div>
      <p class="hint">팁: Normal은 기본, Hard는 더 빠르고 보호구간이 짧습니다.</p>
    </main>

    <script type="module">
      import { computeDifficulty, getPresetConfig, normalizePreset } from "./difficulty.js";
      import { createSfx } from "./sfx.js";

      const STORAGE_KEY = "arcadia_meteor_dodge_best_v1";
      const DIFFICULTY_KEY = "arcadia_meteor_dodge_difficulty_v1";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const subtitleText = document.getElementById("subtitleText");
      const scoreText = document.getElementById("scoreText");
      const bestText = document.getElementById("bestText");
      const livesText = document.getElementById("livesText");
      const levelText = document.getElementById("levelText");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const overlayBadge = document.getElementById("overlayBadge");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const difficultySelect = document.getElementById("difficultySelect");
      const leftBtn = document.getElementById("leftBtn");
      const rightBtn = document.getElementById("rightBtn");

      const sfx = createSfx();

      const state = {
        running: false,
        paused: false,
        gameOver: false,
        score: 0,
        scoreFloat: 0,
        best: Number(localStorage.getItem(STORAGE_KEY) || 0),
        isNewBest: false,
        difficulty: normalizePreset(localStorage.getItem(DIFFICULTY_KEY) || "normal"),
        level: 1,
        lives: 3,
        meteorSpawnMs: 900,
        spawnElapsed: 0,
        meteorSpeedBase: 220,
        hitFlash: 0,
        invincibleMs: 0,
        countdownMs: 0,
        countdownSecondMark: 0,
        graceMs: 0,
      };

      const input = {
        left: false,
        right: false,
      };

      function getDifficultyConfig() {
        return getPresetConfig(state.difficulty);
      }

      function syncDifficultyUI() {
        const cfg = getDifficultyConfig();
        difficultySelect.value = cfg.key;
        subtitleText.textContent = `운석 회피 아케이드 · ${cfg.label}`;
      }

      function applyDifficulty(nextDifficulty, { resetRound = false } = {}) {
        state.difficulty = normalizePreset(nextDifficulty);
        localStorage.setItem(DIFFICULTY_KEY, state.difficulty);
        syncDifficultyUI();

        if (!resetRound) return;

        releaseAllInput();
        state.running = false;
        state.paused = false;
        state.gameOver = false;
        resetGame();
        overlayBadge.classList.add("hidden");
        showOverlay("난이도 변경", `${getDifficultyConfig().label}로 변경되었습니다.\n시작 버튼으로 새 라운드를 시작해 주세요.`);
        startBtn.textContent = "시작";
        pauseBtn.textContent = "일시정지";
      }

      const player = {
        x: canvas.width * 0.5,
        y: canvas.height * 0.86,
        w: 76,
        h: 42,
        speed: 440,
      };

      const stars = Array.from({ length: 66 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.4,
        vy: Math.random() * 34 + 10,
      }));

      const meteors = [];

      let rafId = 0;
      let lastTs = performance.now();

      function resetGame() {
        const cfg = getDifficultyConfig();

        state.score = 0;
        state.scoreFloat = 0;
        state.isNewBest = false;
        state.level = 1;
        state.lives = cfg.lives;
        state.meteorSpawnMs = 900;
        state.meteorSpeedBase = 220;
        state.spawnElapsed = 0;
        state.hitFlash = 0;
        state.invincibleMs = 0;
        state.countdownMs = cfg.countdownMs;
        state.countdownSecondMark = Math.max(1, Math.ceil(cfg.countdownMs / 1000));
        state.graceMs = 0;
        state.gameOver = false;
        player.x = canvas.width * 0.5;
        meteors.length = 0;
        syncHud();
      }

      function startGame() {
        if (!state.gameOver && state.running) return;
        if (state.gameOver || !state.running) resetGame();
        state.running = true;
        state.paused = false;
        releaseAllInput();
        startBtn.textContent = "시작";
        overlayBadge.classList.add("hidden");
        overlay.classList.add("hidden");
        pauseBtn.textContent = "일시정지";
      }

      function setPaused(nextPaused, reason = "") {
        if (!state.running || state.gameOver) return;
        state.paused = nextPaused;
        pauseBtn.textContent = state.paused ? "재개" : "일시정지";

        if (state.paused) {
          releaseAllInput();
          overlayBadge.classList.add("hidden");
          startBtn.textContent = "재개";
          const reasonLine = reason ? `${reason}\n` : "";
          showOverlay("일시정지", `${reasonLine}시작 버튼 또는 상단 일시정지 버튼으로 다시 시작할 수 있습니다.`);
        } else {
          startBtn.textContent = "시작";
          overlay.classList.add("hidden");
        }
      }

      function pauseGame() {
        setPaused(!state.paused);
      }

      function endGame() {
        state.running = false;
        state.gameOver = true;
        releaseAllInput();

        state.isNewBest = state.score > state.best;
        if (state.isNewBest) {
          state.best = state.score;
          localStorage.setItem(STORAGE_KEY, String(state.best));
          sfx.play("best");
        } else {
          sfx.play("gameover");
        }

        syncHud();

        if (state.isNewBest) {
          overlayBadge.textContent = "🏆 NEW BEST";
          overlayBadge.classList.remove("hidden");
        } else {
          overlayBadge.classList.add("hidden");
        }

        showOverlay(
          "게임 오버",
          `최종 점수 ${state.score}점 · 최고 점수 ${state.best}점\n다시 시작 또는 포털 이동을 선택해 주세요.`
        );
        startBtn.textContent = "다시 시작";
      }

      function showOverlay(title, text) {
        overlayTitle.textContent = title;
        overlayText.innerHTML = text.replace(/\n/g, "<br />");
        overlay.classList.remove("hidden");
      }

      function syncHud() {
        scoreText.textContent = String(state.score);
        bestText.textContent = String(state.best);
        const shield = state.graceMs > 0 ? " 🛡" : "";
        livesText.textContent = (state.lives > 0 ? "❤".repeat(state.lives) : "0") + shield;
        levelText.textContent = String(state.level);
      }

      function spawnMeteor() {
        const levelFactor = 1 + state.level * 0.11;
        const r = Math.random() * 30 + 18;
        meteors.push({
          x: Math.random() * (canvas.width - r * 2) + r,
          y: -r - 10,
          r,
          vy: (state.meteorSpeedBase + Math.random() * 130) * levelFactor,
          vx: (Math.random() - 0.5) * 54,
          rot: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 2.6,
        });
      }

      function circleRectHit(circle, rect) {
        const nearestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const nearestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy < circle.r * circle.r;
      }

      function clampPlayer() {
        const half = player.w * 0.5;
        player.x = Math.max(half, Math.min(canvas.width - half, player.x));
      }

      function updateDifficulty() {
        const next = computeDifficulty(state.score, state.difficulty);
        state.meteorSpawnMs = next.meteorSpawnMs;
        state.meteorSpeedBase = next.meteorSpeedBase;
        state.level = next.level;
      }

      function step(deltaSec) {
        if (!state.running || state.paused) return;

        const deltaMs = deltaSec * 1000;

        const move = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        player.x += move * player.speed * deltaSec;
        clampPlayer();

        if (state.countdownMs > 0) {
          const prevSecond = state.countdownSecondMark;
          state.countdownMs -= deltaMs;
          const nextSecond = Math.max(0, Math.ceil(state.countdownMs / 1000));

          if (nextSecond > 0 && nextSecond < prevSecond) {
            sfx.play("tick");
          }

          state.countdownSecondMark = nextSecond;

          if (state.countdownMs <= 0) {
            state.countdownMs = 0;
            state.graceMs = getDifficultyConfig().graceMs;
            state.spawnElapsed = 0;
            meteors.length = 0;
            sfx.play("start");
          }

          syncHud();
          return;
        }

        updateDifficulty();

        state.spawnElapsed += deltaMs;
        if (state.spawnElapsed >= state.meteorSpawnMs) {
          spawnMeteor();
          state.spawnElapsed = 0;
        }

        if (state.graceMs > 0) state.graceMs -= deltaMs;
        if (state.invincibleMs > 0) state.invincibleMs -= deltaMs;
        if (state.hitFlash > 0) state.hitFlash -= deltaSec;

        const playerRect = {
          x: player.x - player.w * 0.5,
          y: player.y - player.h * 0.5,
          w: player.w,
          h: player.h,
        };

        for (let i = meteors.length - 1; i >= 0; i -= 1) {
          const m = meteors[i];
          m.x += m.vx * deltaSec;
          m.y += m.vy * deltaSec;
          m.rot += m.spin * deltaSec;

          if (m.x - m.r < 0 || m.x + m.r > canvas.width) m.vx *= -1;

          if (m.y - m.r > canvas.height + 50) {
            meteors.splice(i, 1);
            state.scoreFloat += 4;
            state.score = Math.floor(state.scoreFloat);
            continue;
          }

          if (state.graceMs <= 0 && state.invincibleMs <= 0 && circleRectHit(m, playerRect)) {
            meteors.splice(i, 1);
            state.lives -= 1;
            state.hitFlash = 0.36;
            state.invincibleMs = 780;
            sfx.play("hit");
            if (state.lives <= 0) {
              endGame();
              break;
            }
          }
        }

        state.scoreFloat += 50 * deltaSec;
        state.score = Math.floor(state.scoreFloat);
        syncHud();
      }

      function drawShip(x, y, w, h) {
        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = "#5be3ff";
        ctx.beginPath();
        ctx.moveTo(0, -h * 0.58);
        ctx.lineTo(w * 0.52, h * 0.5);
        ctx.lineTo(0, h * 0.18);
        ctx.lineTo(-w * 0.52, h * 0.5);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#8bf1ff";
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.05, w * 0.12, h * 0.16, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffa45f";
        ctx.beginPath();
        ctx.moveTo(-w * 0.16, h * 0.5);
        ctx.lineTo(0, h * (0.5 + Math.random() * 0.12));
        ctx.lineTo(w * 0.16, h * 0.5);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      function drawMeteor(m) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.rot);

        const grd = ctx.createRadialGradient(-m.r * 0.3, -m.r * 0.25, m.r * 0.2, 0, 0, m.r * 1.1);
        grd.addColorStop(0, "#f0b36f");
        grd.addColorStop(0.46, "#d46f35");
        grd.addColorStop(1, "#772f1d");

        ctx.fillStyle = grd;
        ctx.beginPath();
        for (let i = 0; i < 8; i += 1) {
          const a = (Math.PI * 2 * i) / 8;
          const jag = m.r * (0.82 + (i % 2 ? 0.3 : 0));
          const px = Math.cos(a) * jag;
          const py = Math.sin(a) * jag;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.beginPath();
        ctx.arc(m.r * 0.2, m.r * 0.1, m.r * 0.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawBackground(deltaSec) {
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bg.addColorStop(0, "#060f2e");
        bg.addColorStop(1, "#030716");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(170, 210, 255, 0.9)";
        stars.forEach((s) => {
          s.y += s.vy * deltaSec;
          if (s.y > canvas.height) {
            s.y = -5;
            s.x = Math.random() * canvas.width;
          }
          ctx.globalAlpha = 0.35 + (s.r / 2.8);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function render(deltaSec) {
        drawBackground(deltaSec);

        meteors.forEach(drawMeteor);

        if (state.invincibleMs > 0 && Math.floor(state.invincibleMs / 90) % 2 === 0) {
          // blink during invincibility
        } else {
          drawShip(player.x, player.y, player.w, player.h);
        }

        if (state.countdownMs > 0) {
          const n = Math.max(1, Math.ceil(state.countdownMs / 1000));
          ctx.fillStyle = "rgba(3, 8, 26, 0.4)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#dff6ff";
          ctx.textAlign = "center";
          ctx.font = "700 96px system-ui";
          ctx.fillText(String(n), canvas.width * 0.5, canvas.height * 0.52);
          ctx.font = "600 24px system-ui";
          ctx.fillText("준비", canvas.width * 0.5, canvas.height * 0.62);
        } else if (state.graceMs > 0) {
          const remain = (state.graceMs / 1000).toFixed(1);
          ctx.fillStyle = "rgba(35, 211, 255, 0.18)";
          ctx.fillRect(16, 16, 170, 34);
          ctx.strokeStyle = "rgba(98, 224, 255, 0.6)";
          ctx.strokeRect(16, 16, 170, 34);
          ctx.fillStyle = "#baf4ff";
          ctx.font = "600 18px system-ui";
          ctx.textAlign = "left";
          ctx.fillText(`🛡 보호 ${remain}s`, 26, 39);
        }

        if (state.hitFlash > 0) {
          ctx.fillStyle = `rgba(255, 80, 80, ${Math.min(0.34, state.hitFlash)})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }

      function frame(now) {
        const deltaSec = Math.min(0.033, (now - lastTs) / 1000);
        lastTs = now;

        step(deltaSec);
        render(deltaSec);

        rafId = requestAnimationFrame(frame);
      }

      function syncControlButtons() {
        leftBtn.classList.toggle("is-pressed", input.left);
        rightBtn.classList.toggle("is-pressed", input.right);
      }

      function setMove(direction, active) {
        if (direction === "left") input.left = active;
        if (direction === "right") input.right = active;
        syncControlButtons();
      }

      function bindKeyboard() {
        window.addEventListener("keydown", (e) => {
          const key = e.key.toLowerCase();
          if (e.key === " ") e.preventDefault();
          if (e.key === "ArrowLeft" || key === "a") setMove("left", true);
          if (e.key === "ArrowRight" || key === "d") setMove("right", true);
          if (key === "p" && !e.repeat) pauseGame();
          if (e.key === " " && state.paused) setPaused(false);
          if (e.key === " " && !state.running) startGame();
        });

        window.addEventListener("keyup", (e) => {
          if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") setMove("left", false);
          if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") setMove("right", false);
        });
      }

      function bindCanvasSafety() {
        canvas.addEventListener(
          "pointerdown",
          (e) => {
            // 캔버스 터치로 플레이어 위치가 순간이동하지 않도록 기본 동작만 차단
            e.preventDefault();
          },
          { passive: false }
        );
      }

      function bindMobileButtons(button, direction) {
        const press = (e) => {
          e?.preventDefault?.();
          setMove(direction, true);
          if (!state.running && !state.gameOver) startGame();
        };

        const release = (e) => {
          e?.preventDefault?.();
          setMove(direction, false);
          if (e?.pointerId != null) {
            try { button.releasePointerCapture(e.pointerId); } catch {}
          }
        };

        if ("PointerEvent" in window) {
          button.addEventListener("pointerdown", (e) => {
            press(e);
            try { button.setPointerCapture(e.pointerId); } catch {}
          });
          button.addEventListener("pointerup", release);
          button.addEventListener("pointercancel", release);
          button.addEventListener("lostpointercapture", release);
          button.addEventListener("pointerleave", release);
        } else {
          button.addEventListener("touchstart", press, { passive: false });
          button.addEventListener("touchend", release, { passive: false });
          button.addEventListener("touchcancel", release, { passive: false });
          button.addEventListener("mousedown", press);
          button.addEventListener("mouseup", release);
          button.addEventListener("mouseleave", release);
        }

        button.addEventListener("contextmenu", (e) => e.preventDefault());
      }

      function releaseAllInput() {
        input.left = false;
        input.right = false;
        syncControlButtons();
      }

      function bindAutoPause() {
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            releaseAllInput();
            if (state.running && !state.paused && !state.gameOver) {
              setPaused(true, "앱 전환으로 자동 일시정지되었습니다.");
            }
          }
        });

        window.addEventListener("blur", () => {
          releaseAllInput();
        });
      }

      startBtn.addEventListener("click", () => {
        if (state.paused) {
          setPaused(false);
          return;
        }
        startGame();
      });

      pauseBtn.addEventListener("click", pauseGame);

      difficultySelect.addEventListener("change", (e) => {
        applyDifficulty(e.target.value, { resetRound: true });
      });

      bindMobileButtons(leftBtn, "left");
      bindMobileButtons(rightBtn, "right");
      bindKeyboard();
      bindCanvasSafety();
      bindAutoPause();
      syncDifficultyUI();
      syncHud();
      showOverlay("Meteor Dodge", "난이도(Normal/Hard)를 고른 뒤 시작하세요.<br />시작 시 카운트다운과 보호구간이 적용됩니다.");

      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame((ts) => {
        lastTs = ts;
        frame(ts);
      });
    </script>
  </body>
</html>
