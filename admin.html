<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcadia Hub Admin</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow">ARCADIA HUB ADMIN</p>
        <h1>게임 등록/관리</h1>
        <p class="subtitle">등록하면 메인 포털에서 바로 표시됩니다 (localStorage 기반).</p>
        <p id="portalVersionText" class="version-text">Portal v0.1.0</p>
      </div>
      <div class="topbar-actions">
        <a class="ghost-btn" href="./index.html">포털로 돌아가기</a>
      </div>
    </header>

    <main class="layout admin-layout">
      <section class="panel content-panel">
        <h2>게임 등록/수정</h2>
        <form id="gameForm" class="admin-form">
          <div class="form-grid">
            <label class="field"><span>ID</span><input name="id" required placeholder="예: neon-racer" /></label>
            <label class="field"><span>게임명</span><input name="title" required /></label>
            <label class="field"><span>장르</span><input name="genre" required placeholder="액션" /></label>
            <label class="field"><span>카테고리</span><input name="category" required placeholder="트렌딩" /></label>
            <label class="field"><span>플랫폼</span>
              <select name="platform">
                <option value="desktop">desktop</option>
                <option value="mobile">mobile</option>
                <option value="cross" selected>cross</option>
              </select>
            </label>
            <label class="field"><span>인기도(0~100)</span><input name="popularity" type="number" min="0" max="100" value="80" /></label>
            <label class="field"><span>게임 버전(semver)</span><input name="version" value="0.1.0" placeholder="예: 0.1.1" /></label>
            <label class="field"><span>업데이트일</span><input name="updatedAt" type="date" required /></label>
            <label class="field"><span>게임 링크</span><input name="playUrl" type="url" required placeholder="https://..." /></label>
            <label class="field"><span>스튜디오</span><input name="studio" value="Arcadia Studio" /></label>
            <label class="field"><span>난이도</span><input name="difficulty" value="보통" /></label>
            <label class="field"><span>예상 플레이시간</span><input name="estimatedPlayTime" value="10~20분" /></label>
            <label class="field"><span>조작법</span><input name="controls" value="마우스 또는 키보드 기본 입력" /></label>
          </div>

          <label class="field"><span>태그(쉼표 구분)</span><input name="tags" placeholder="레이싱, 3D, 멀티" /></label>
          <label class="field"><span>짧은 설명</span><textarea name="description" required rows="3"></textarea></label>
          <label class="field"><span>상세 설명</span><textarea name="longDescription" rows="4"></textarea></label>

          <div class="button-row">
            <button class="small-btn" type="submit">저장/업데이트</button>
            <button class="small-btn" type="button" id="resetFormBtn">입력 초기화</button>
          </div>
        </form>
      </section>

      <section class="panel content-panel">
        <h2>등록된 커스텀 게임</h2>
        <div id="adminList" class="admin-list"></div>
      </section>
    </main>

    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
