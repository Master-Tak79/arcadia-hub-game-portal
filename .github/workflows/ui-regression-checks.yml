name: UI Regression Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Shared UI common check
        run: node scripts/shared-ui-common-check.mjs

      - name: Game UI check
        run: node scripts/game-ui-check.mjs

      - name: Full smoke check
        run: bash scripts/meteor-smoke-check.sh
